services:
  argo-workflows-mcp:
    build: .
    image: argo-workflows-mcp:latest
    container_name: argo-workflows-mcp
    environment:
      ARGO_MCP_HOST: "0.0.0.0"
      ARGO_MCP_PORT: "8080"
      ARGO_MCP_DB_PATH: "/app/data/argo-workflows-mcp.db"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data
